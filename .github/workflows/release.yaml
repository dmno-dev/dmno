name: Release packages

on:
  push:
    branches:
      - main

concurrency:
  group: bumpy-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # npm trusted publishing (OIDC) + NPM_TOKEN secret are scoped to this environment
    environment: publish
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write # required for npm provenance / OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          # full history is needed for bumpy to compare against the base branch
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: 'pnpm'
      - name: Install node deps
        run: pnpm i
      # Ensure a recent npm for OIDC/provenance publishing (bumpy publishes with provenance)
      - name: Update npm
        run: npm install -g npm@latest
      - name: Enable turborepo build cache
        uses: rharkor/caching-for-turbo@v2.3.2
      - name: Build publishable DMNO modules
        run: pnpm build:libs
      - name: Create Release PR / Publish to npm
        # opens/updates a version PR when bump files are pending,
        # and publishes to npm when that version PR is merged to main
        run: pnpm exec bumpy ci release
        env:
          # BUMPY_GH_TOKEN: a bot PAT used to push the version branch + open the PR so that
          # PR workflows (e.g. release-preview) get triggered for it. Falls back to GITHUB_TOKEN.
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # TODO: send notifications?
